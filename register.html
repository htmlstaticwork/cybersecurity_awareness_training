<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>CyberShield — Request Access</title>
  <link rel="stylesheet" href="css/global.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: url('https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=1920&q=80');
      background-size: cover;
      background-position: center;
      position: relative;
      overflow-y: auto;
      padding: 40px 20px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: var(--hero-overlay);
    }

    [data-theme="light"] body::before {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0.5) 60%, rgba(255, 255, 255, 0.5) 100%);
    }

    .register-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
      /* Centered, compact layout like login */
      margin: 0 auto;
    }

    .register-box {
      background: var(--primary-90);
      border: var(--border-glow);
      border-radius: 4px;
      padding: 40px;
      backdrop-filter: blur(20px);
      box-shadow: var(--glow-secondary);
      animation: fadeInUp 0.7s ease;
      position: relative;
    }

    .auth-utility-controls {
      position: fixed;
      top: 24px;
      right: 24px;
      display: flex;
      gap: 12px;
      z-index: 2000;
    }

    .reg-brand-center {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      justify-content: center;
      text-decoration: none;
    }
    .reg-brand-center .brand-name {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .reg-brand-center:hover .brand-logo {
      transform: scale(1.1);
      box-shadow: var(--glow-secondary);
    }

    .brand-logo {
      transition: var(--transition);
    }

    /* Remove grid, use single box */
    @media (max-width: 767px) {
      .register-box {
        padding: 28px 20px;
      }
    }

    /* LEFT PANEL */
    .register-left {
      background: var(--secondary-05);
      border-right: 1px solid var(--secondary-20);
      padding: 44px 36px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    @media (max-width: 767px) {
      .register-left {
        display: none;
      }
    }

    .reg-brand {
      margin-bottom: 40px;
    }

    .reg-tagline {
      font-size: 1.6rem;
      line-height: 1.2;
      margin-bottom: 20px;
    }

    .reg-features {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .reg-feature {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .reg-feature-icon {
      width: 32px;
      height: 32px;
      background: var(--secondary-20);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--secondary);
      flex-shrink: 0;
    }

    .reg-feature-text h4 {
      font-size: 0.88rem;
      margin-bottom: 2px;
    }

    .reg-feature-text p {
      font-size: 0.8rem;
    }

    .reg-proof {
      background: var(--primary-80);
      border: var(--border-glow);
      border-radius: 4px;
      padding: 16px;
      margin-top: 32px;
    }

    .reg-proof p {
      font-size: 0.85rem;
      font-style: italic;
      margin-bottom: 10px;
    }

    .reg-proof-author {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--secondary);
      letter-spacing: 1px;
    }

    /* RIGHT PANEL */
    .register-right {
      padding: 44px;
    }

    @media (max-width: 480px) {
      .register-right {
        padding: 28px 20px;
      }
    }

    .register-right h2 {
      margin-bottom: 8px;
      font-size: 1.4rem;
    }

    .register-right>p {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    .step-dots {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      justify-content: flex-start;
    }

    .step-dot {
      width: 28px;
      height: 4px;
      border-radius: 2px;
      background: var(--secondary-20);
      transition: background 0.3s;
    }

    .step-dot.active {
      background: var(--secondary);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 480px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }

    .password-strength {
      margin-top: 8px;
      display: flex;
      gap: 4px;
    }

    .strength-bar {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: var(--secondary-20);
      transition: background 0.3s;
    }

    .strength-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .terms-check {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 20px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .terms-check input {
      margin-top: 3px;
      accent-color: var(--secondary);
    }

    .terms-check a {
      color: var(--secondary);
    }

    .register-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    .register-footer a {
      color: var(--secondary);
    }

    .sso-btn {
      width: 100%;
      background: var(--secondary-05);
      border: 1px solid var(--secondary-20);
      color: var(--text-primary);
      padding: 12px;
      border-radius: 2px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: 10px;
    }

    .sso-btn:hover {
      background: var(--secondary-10);
      border-color: var(--secondary);
    }

    .sso-btn svg {
      width: 18px;
      height: 18px;
    }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--secondary-20);
    }

    .login-divider span {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-dim);
      letter-spacing: 1px;
    }
  </style>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
</head>

<body>
  <!-- NO HEADER / FOOTER on register page -->
  <div class="cyber-grid" style="position:fixed;inset:0;"></div>

  <div class="auth-utility-controls">
    <button class="toggle-btn rtl-toggle" aria-label="Toggle RTL">RTL</button>
    <button class="toggle-btn theme-toggle" aria-label="Toggle theme">☀️</button>
  </div>

  <div class="register-wrap">
    <div class="register-box">
      <a href="index.html" class="reg-brand-center">
        <div class="brand-logo pulse-glow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:22px;height:22px;">
            <path d="M12 2L2 7l10 5 10-5-10-5z" />
            <path d="M2 17l10 5 10-5" />
            <path d="M2 12l10 5 10-5" />
          </svg>
        </div>
        <span class="brand-name">CYBER<span></span></span>
      </a>

      <div style="text-align:center;">
        <h2 style="margin-bottom:8px;">Create Your <span class="gradient-text">Account</span></h2>
        <p style="font-size:0.9rem;color:var(--text-muted);margin-bottom:28px;">Start your free trial today.</p>
      </div>

      <form class="cyber-form" id="registerForm">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" class="form-control" placeholder="" required />
        </div>

        <div class="form-group">
          <label>Last Name</label>
          <input type="text" class="form-control" placeholder="" required />
        </div>
        <div class="form-group">
          <label>Work Email</label>
          <input type="email" class="form-control" placeholder="" required id="regEmail" />
        </div>

        <div class="form-group">
          <label>Company Name</label>
          <input type="text" class="form-control" placeholder="" required />
        </div>




        <div class="form-group">
          <label>Password</label>
          <div style="position:relative;">
            <input type="password" class="form-control" placeholder="" required id="regPass"
              style="padding-right:44px;" />
            <button type="button" id="regEyeBtn"
              style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-dim);cursor:pointer;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>

        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <div style="position:relative;">
            <input type="password" class="form-control" placeholder="" required id="regPass"
              style="padding-right:44px;" />
            <button type="button" id="regEyeBtn"
              style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-dim);cursor:pointer;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>

        </div>


        <div class="terms-check">
          <input type="checkbox" required />
          <span>I agree <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>. </span>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;font-size:0.9rem;">
          Create Account →
        </button>
      </form>
      <div class="login-divider"><span>OR Sign Up WITH</span></div>

      <!-- SSO Options -->
      <button class="sso-btn">
        <svg viewBox="0 0 23 23" fill="#f25022">
          <rect width="10.5" height="10.5" />
          <rect x="11.5" width="10.5" height="10.5" fill="#7fba00" />
          <rect y="11.5" width="10.5" height="10.5" fill="#00a4ef" />
          <rect x="11.5" y="11.5" width="10.5" height="10.5" fill="#ffb900" />
        </svg>
        Microsoft Office 365
      </button>
      <button class="sso-btn">
        <svg viewBox="0 0 48 48">
          <path fill="#EA4335"
            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
          <path fill="#4285F4"
            d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
          <path fill="#FBBC05"
            d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.97-6.19z" />
          <path fill="#34A853"
            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
          <path fill="none" d="M0 0h48v48H0z" />
        </svg>
        Google Workspace
      </button>
      <button class="sso-btn">
        <svg viewBox="0 0 384 512" style="width:18px;height:18px;fill:currentColor;"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-1.5 90.3-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
        Register with Apple
      </button>
      <div class="register-footer">
        Already have an account? <a href="login.html">Sign in →</a>
      </div>


    </div>
  </div>

  
  </div>

  <script src="js/global.js"></script>
  <script>
    // Password toggle
    document.getElementById('regEyeBtn')?.addEventListener('click', () => {
      const p = document.getElementById('regPass');
      p.type = p.type === 'password' ? 'text' : 'password';
    });

    // Password strength
    const regPass = document.getElementById('regPass');
    const bars = document.querySelectorAll('.strength-bar');
    const label = document.getElementById('strengthLabel');
    const strengthColors = ['var(--accent)', '#ffa500', '#ffa500', 'var(--secondary)'];
    const strengthLabels = ['', 'Weak', 'Moderate', 'Strong', 'Very Strong'];

    regPass?.addEventListener('input', () => {
      const v = regPass.value;
      let score = 0;
      if (v.length >= 8) score++;
      if (v.length >= 12) score++;
      if (/[A-Z]/.test(v) && /[0-9]/.test(v)) score++;
      if (/[^A-Za-z0-9]/.test(v)) score++;

      bars.forEach((bar, i) => {
        bar.style.background = i < score ? strengthColors[score - 1] || 'var(--secondary)' : 'var(--secondary-20)';
      });
      if (label) label.textContent = strengthLabels[score] || 'Enter a password';
    });

    // Register form
    document.getElementById('registerForm')?.addEventListener('submit', e => {
      e.preventDefault();
      const btn = e.target.querySelector('[type=submit]');
      btn.textContent = 'Creating account...';
      btn.disabled = true;
      // Animate step dots
      document.querySelectorAll('.step-dot').forEach((dot, i) => {
        setTimeout(() => dot.classList.add('active'), i * 400);
      });
      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 1800);
    });
  </script>
</body>

</html>
