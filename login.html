<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>CyberShield — Login</title>
  <link rel="stylesheet" href="css/global.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: url('https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=1920&q=80');
      background-size: cover;
      background-position: center;
      position: relative;
      overflow-y: auto;
      padding: 40px 20px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: var(--hero-overlay);
    }

    [data-theme="light"] body::before {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0.5) 60%, rgba(255, 255, 255, 0.5) 100%);
    }

    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }

    .login-box {
      background: var(--primary-90);
      border: var(--border-glow);
      border-radius: 4px;
      padding: 44px;
      backdrop-filter: blur(20px);
      box-shadow: var(--glow-secondary);
      animation: fadeInUp 0.7s ease;
      position: relative;
    }

    .auth-utility-controls {
      position: fixed;
      top: 24px;
      right: 24px;
      display: flex;
      gap: 12px;
      z-index: 2000;
    }

    @media (max-width: 480px) {
      .login-box {
        padding: 28px 20px;
      }
    }

    .login-logo {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      justify-content: center;
    }

    .login-logo .brand-name {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .login-title {
      font-size: 1.4rem;
      text-align: center;
      margin-bottom: 8px;
    }

    .login-sub {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-dim);
      text-align: center;
      letter-spacing: 1.5px;
      margin-bottom: 32px;
    }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--secondary-20);
    }

    .login-divider span {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    .sso-btn {
      width: 100%;
      background: var(--secondary-05);
      border: 1px solid var(--secondary-20);
      color: var(--text-primary);
      padding: 12px;
      border-radius: 2px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: 10px;
    }

    .sso-btn:hover {
      background: var(--secondary-10);
      border-color: var(--secondary);
    }

    .sso-btn svg {
      width: 18px;
      height: 18px;
    }

    .forgot-link {
      text-align: right;
      font-size: 0.82rem;
      margin-top: -8px;
      margin-bottom: 20px;
    }

    .forgot-link a {
      color: var(--secondary);
      font-size: 0.82rem;
    }

    .login-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    .login-footer a {
      color: var(--secondary);
    }

    .security-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-dim);
    }

    .security-dot {
      width: 6px;
      height: 6px;
      background: #00ff88;
      border-radius: 50%;
      box-shadow: 0 0 6px #00ff88;
    }

    /* Corner decorations */
    .corner-deco {
      position: fixed;
      width: 60px;
      height: 60px;
      pointer-events: none;
      z-index: 0;
    }

    .corner-deco.tl {
      top: 20px;
      left: 20px;
      border-top: 1px solid var(--secondary-30);
      border-left: 1px solid var(--secondary-30);
    }

    .corner-deco.tr {
      top: 20px;
      right: 20px;
      border-top: 1px solid var(--secondary-30);
      border-right: 1px solid var(--secondary-30);
    }

    .corner-deco.bl {
      bottom: 20px;
      left: 20px;
      border-bottom: 1px solid var(--secondary-30);
      border-left: 1px solid var(--secondary-30);
    }

    .corner-deco.br {
      bottom: 20px;
      right: 20px;
      border-bottom: 1px solid var(--secondary-30);
      border-right: 1px solid var(--secondary-30);
    }

    .password-toggle {
      position: relative;
    }

    .password-toggle .form-control {
      padding-right: 44px;
    }

    .password-eye {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      transition: color 0.3s;
    }

    .password-eye:hover {
      color: var(--secondary);
    }
  </style>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
</head>

<body>
  <!-- NO HEADER / FOOTER on login page -->
  <div class="cyber-grid" style="position:fixed;inset:0;"></div>
  <div class="corner-deco tl"></div>
  <div class="corner-deco tr"></div>
  <div class="corner-deco bl"></div>
  <div class="corner-deco br"></div>

  <div class="auth-utility-controls">
    <button class="toggle-btn rtl-toggle" aria-label="Toggle RTL">RTL</button>
    <button class="toggle-btn theme-toggle" aria-label="Toggle theme">☀️</button>
  </div>

  <div class="login-wrap">
    <div class="login-box">
      <a href="index.html" class="login-logo" style="text-decoration:none;">
        <div class="brand-logo pulse-glow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:22px;height:22px;">
            <path d="M12 2L2 7l10 5 10-5-10-5z" />
            <path d="M2 17l10 5 10-5" />
            <path d="M2 12l10 5 10-5" />
          </svg>
        </div>
        <span class="brand-name">CYBER<span></span></span>
      </a>

      <h2 class="login-title">Secure <span class="gradient-text">Access Portal</span></h2>
      <p class="login-sub">ENTERPRISE SECURITY PLATFORM · AUTHORIZED ACCESS ONLY</p>




      <form class="cyber-form" id="loginForm">
        <div class="form-group">
          <label>Work Email</label>
          <input type="email" class="form-control" placeholder="" required id="loginEmail" />
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="password-toggle">
            <input type="password" class="form-control" placeholder="" required id="loginPass" />
            <button type="button" class="password-eye" id="eyeBtn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <div
          style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; margin-top: -10px;">
          <label
            style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:0.82rem;color:var(--text-dim);">
            <input type="checkbox" style="accent-color:var(--secondary);" />
            Remember Me
          </label>
          <div class="forgot-link" style="margin-top:0; margin-bottom:0;"><a href="#">Forgot password?</a></div>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;font-size:0.9rem;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <rect x="3" y="11" width="18" height="11" rx="2" />
            <path d="M7 11V7a5 5 0 0110 0v4" />
          </svg>
          Sign In Securely
        </button>
      </form>
      <div class="login-divider"><span>OR SIGN IN WITH</span></div>

      <!-- SSO Options -->
      <button class="sso-btn">
        <svg viewBox="0 0 23 23" fill="#f25022">
          <rect width="10.5" height="10.5" />
          <rect x="11.5" width="10.5" height="10.5" fill="#7fba00" />
          <rect y="11.5" width="10.5" height="10.5" fill="#00a4ef" />
          <rect x="11.5" y="11.5" width="10.5" height="10.5" fill="#ffb900" />
        </svg>
        Microsoft Office 365
      </button>
      <button class="sso-btn">
        <svg viewBox="0 0 48 48">
          <path fill="#EA4335"
            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
          <path fill="#4285F4"
            d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
          <path fill="#FBBC05"
            d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.97-6.19z" />
          <path fill="#34A853"
            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
          <path fill="none" d="M0 0h48v48H0z" />
        </svg>
        Google Workspace
      </button>
      <button class="sso-btn">
        <svg viewBox="0 0 384 512" style="width:18px;height:18px;fill:currentColor;"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-1.5 90.3-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
        Login with Apple Id
      </button>
      <div class="login-footer">
        Don't have an account? <a href="register.html">Sign Up to Access →</a>
      </div>


    </div>

    <!-- Back link -->

  </div>

  <script src="js/global.js"></script>
  <script>
    // Password toggle
    const eyeBtn = document.getElementById('eyeBtn');
    const passInput = document.getElementById('loginPass');
    if (eyeBtn && passInput) {
      eyeBtn.addEventListener('click', () => {
        passInput.type = passInput.type === 'password' ? 'text' : 'password';
      });
    }
    // Login form
    document.getElementById('loginForm')?.addEventListener('submit', e => {
      e.preventDefault();
      const btn = e.target.querySelector('[type=submit]');
      btn.textContent = 'Authenticating...';
      btn.disabled = true;
      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 1400);
    });
  </script>
</body>

</html>
